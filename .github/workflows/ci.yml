name: CI

on:
  pull_request:
  push:
    branches: master

# TODO: Windows

jobs:
  posix-cmake:
    name: "CMake ${{ matrix.compiler }} ${{ matrix.cxxstd }} ${{ matrix.build-type }} ${{ matrix.cxxflags }}"
    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        include:
          - id: gcc13-debug
            compiler: g++-13
            container: build-gcc13
            cxxstd: "20"
            build-type: "Debug"
            cxxflags: "-fsanitize=address -fsanitize=undefined -fno-sanitize-recover=all"
            ldflags: "-fsanitize=address -fsanitize=undefined"

          - id: gcc13-release
            compiler: g++-13
            container: build-gcc13
            cxxstd: "20"
            build-type: "Release"

          - id: clang20-debug
            compiler: clang++-20
            container: build-clang20
            cxxstd: "20"
            build-type: "Debug"
            cxxflags: "-fsanitize=address -fsanitize=undefined -fno-sanitize-recover=all"
            ldflags: "-fsanitize=address -fsanitize=undefined"

          - id: clang20-release
            compiler: clang++-20
            container: build-clang20
            cxxstd: "20"
            build-type: "Release"

    runs-on: ubuntu-latest
    container: ghcr.io/anarthal/cpp-ci-containers/${{ matrix.container }}
    env:
      CXX: ${{matrix.compiler}}
      CXXFLAGS: ${{matrix.cxxflags}} -Wall -Wextra
      LDFLAGS: ${{matrix.ldflags}}
      CMAKE_BUILD_PARALLEL_LEVEL: 4
      BOOST_CAPY_COMMIT: 98be9fdd59b2099b2f4f3a0f2abd4f3d4034d0a6
      BOOST_COROSIO_COMMIT: 7c636ac971110dda93c5152b45081f635d2ff34c
      BOOST_VERSION: "1.91.0-1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore Boost from cache
        id: restore-boost
        uses: actions/cache/restore@v5
        with:
          path: /opt/boost
          key: ${{ matrix.id }}-boost-${{ env.BOOST_VERSION }}-${{ env.BOOST_CAPY_COMMIT }}-${{ env.BOOST_COROSIO_COMMIT }}

      - name: Setup Boost
        if: steps.restore-boost.outputs.cache-hit != 'true'
        run: |
          apt-get update
          apt-get install --no-install-recommends -y wget

          mkdir ~/boost-download
          cd ~/boost-download
          wget -q https://github.com/boostorg/boost/releases/download/boost-${BOOST_VERSION}/boost-${BOOST_VERSION}-b2-nodocs.tar.gz
          tar -xf boost-${BOOST_VERSION}-b2-nodocs.tar.gz
          cd boost-${BOOST_VERSION}

          mkdir libs/capy
          cd libs/capy
          git init .
          git remote add origin https://github.com/cppalliance/capy.git
          git fetch --depth 1 origin $BOOST_CAPY_COMMIT
          git checkout FETCH_HEAD
          cd ../..

          mkdir libs/corosio
          cd libs/corosio
          git init .
          git remote add origin https://github.com/cppalliance/corosio.git
          git fetch --depth 1 origin $BOOST_COROSIO_COMMIT
          git checkout FETCH_HEAD
          cd ../..

          ./bootstrap.sh
          ./b2 cxxstd=20 --with-headers --with-capy --with-corosio --prefix=/opt/boost -d0 install

      - name: Save Boost to cache
        if: steps.restore-boost.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /opt/boost
          key: ${{ matrix.id }}-boost-${{ env.BOOST_VERSION }}-${{ env.BOOST_CAPY_COMMIT }}-${{ env.BOOST_COROSIO_COMMIT }}

      - name: Build the code and run the tests
        run: |
          mkdir __build
          cd __build
          cmake \
            -G Ninja \
            -DCMAKE_PREFIX_PATH=/opt/boost \
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
            -DCMAKE_CXX_STANDARD=${{ matrix.cxxstd }} \
            -DNATIVEPG_COROSIO_API=ON \
            -DBUILD_TESTING=ON \
            ..
          cmake --build .
          ctest --output-on-failure
